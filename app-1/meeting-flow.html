<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Flow Orchestrator</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.x.x/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.x.x/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script src="prompts.js"></script>
<script src="tools.js"></script>
<script src="builders.js"></script>
<script src="streaming.js"></script>
<script src="history.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/json.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  .segment-card { cursor: grab; transition: all 0.15s ease; }
  .segment-card:active { cursor: grabbing; }
  .segment-card.sortable-chosen { opacity: 1; }
  .segment-card.sortable-ghost { opacity: 0.2; outline: 2px dashed #94a3b8; outline-offset: -2px; background: #f1f5f9; }
  .chat-message { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .resize-handle { height: 6px; cursor: row-resize; background: transparent; position: relative; flex-shrink: 0; z-index: 10; }
  .resize-handle::before { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 32px; height: 3px; background: #d1d5db; border-radius: 2px; transition: background 0.15s; }
  .resize-handle:hover::before, .resize-handle.active::before { background: #3b82f6; }
  body.resizing * { user-select: none !important; cursor: row-resize !important; }
  .json-content { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; white-space: pre-wrap; background: #1e293b; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; max-height: 560px; overflow-y: auto; line-height: 1.5; }
  .timeline-bar { transition: all 0.2s ease; cursor: pointer; min-width: 4px; }
  .timeline-bar:hover { filter: brightness(0.9); }
  .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
  .spinner { border: 2px solid #e2e8f0; border-top: 2px solid #3b82f6; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .thinking-section { background: #fefce8; border-left: 3px solid #eab308; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 12px; color: #a16207; }
  .thinking-section summary { cursor: pointer; font-weight: 600; font-size: 11px; color: #b45309; user-select: none; }
  .thinking-section summary:hover { color: #92400e; }
  .thinking-content { margin-top: 6px; white-space: pre-wrap; line-height: 1.5; max-height: 320px; overflow-y: auto; }
  .streaming-cursor::after { content: '|'; animation: blink 0.6s step-end infinite; color: #3b82f6; }
  @keyframes blink { 50% { opacity: 0; } }
  .drop-line { position: absolute; left: 6px; right: 6px; height: 2px; background: #3b82f6; border-radius: 1px; box-shadow: 0 0 6px rgba(59,130,246,0.55); pointer-events: none; z-index: 10; margin-top: -1px; }
  #segmentList { position: relative; }
  @keyframes card-flash {
    0%   { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    15%  { box-shadow: 0 0 0 3px rgba(59,130,246,0.55), 0 0 12px rgba(59,130,246,0.35); }
    100% { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  }
  .segment-card.card-flash { animation: card-flash 800ms ease-out; }
  .markdown-body { line-height: 1.55; word-break: break-word; }
  .markdown-body > *:first-child { margin-top: 0; }
  .markdown-body > *:last-child { margin-bottom: 0; }
  .markdown-body h1 { font-size: 1.15rem; font-weight: 700; margin: 0.6em 0 0.3em; }
  .markdown-body h2 { font-size: 1.05rem; font-weight: 700; margin: 0.55em 0 0.28em; }
  .markdown-body h3 { font-size: 0.98rem; font-weight: 600; margin: 0.5em 0 0.25em; }
  .markdown-body h4, .markdown-body h5, .markdown-body h6 { font-size: 0.9rem; font-weight: 600; margin: 0.45em 0 0.22em; }
  .markdown-body p { margin: 0 0 0.5em; }
  .markdown-body ul, .markdown-body ol { margin: 0.3em 0 0.5em; padding-left: 1.35em; }
  .markdown-body ul { list-style: disc; }
  .markdown-body ol { list-style: decimal; }
  .markdown-body li { margin: 0.12em 0; }
  .markdown-body li > p { margin: 0; }
  .markdown-body code { background: rgba(15,23,42,0.08); padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.85em; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }
  .markdown-body pre { background: #1e293b; color: #e2e8f0; padding: 8px 12px; border-radius: 6px; margin: 0.4em 0; overflow-x: auto; font-size: 11.5px; line-height: 1.45; }
  .markdown-body pre code { background: transparent; padding: 0; font-size: inherit; color: inherit; }
  .markdown-body strong { font-weight: 700; }
  .markdown-body em { font-style: italic; }
  .markdown-body a { color: #2563eb; text-decoration: underline; }
  .markdown-body a:hover { color: #1d4ed8; }
  .markdown-body blockquote { border-left: 3px solid #cbd5e1; padding: 0.1em 0.75em; color: #475569; margin: 0.4em 0; background: rgba(148,163,184,0.08); }
  .markdown-body hr { margin: 0.7em 0; border: 0; border-top: 1px solid #e2e8f0; }
  .markdown-body table { border-collapse: collapse; margin: 0.4em 0; font-size: 12px; }
  .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 3px 8px; text-align: left; }
  .markdown-body th { background: #f1f5f9; font-weight: 600; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans antialiased" x-data="meetingApp()" x-init="init()">

  <!-- Settings Modal -->
  <div x-cloak x-show="showSettings" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center" @click.self="showSettings=false">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 mx-4 max-h-[80vh] overflow-y-auto" @click.stop>
      <h2 class="text-lg font-bold text-gray-800 mb-4">API Settings</h2>
      <template x-for="(cfg, name) in providers" :key="name">
        <div class="mb-5 border border-gray-200 rounded-lg p-4">
          <h3 class="text-sm font-bold text-gray-700 mb-2 uppercase" x-text="name"></h3>
          <label class="block text-xs font-medium text-gray-500 mb-1">API Key</label>
          <input x-model="cfg.apiKey" type="password" class="w-full border rounded-lg px-3 py-2 mb-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none" placeholder="sk-...">
          <label class="block text-xs font-medium text-gray-500 mb-1">Base URL</label>
          <input x-model="cfg.baseUrl" class="w-full border rounded-lg px-3 py-2 mb-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
          <label class="block text-xs font-medium text-gray-500 mb-1">Model</label>
          <!-- DeepSeek: static model name, no selection needed -->
          <div x-show="name === 'deepseek'" class="w-full border rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-600">model1</div>
          <!-- Other providers: select dropdown -->
          <select x-show="name !== 'deepseek'"
            x-effect="syncSelect($el, cfg)"
            @change="cfg.model = $el.value"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
            <template x-for="m in cfg.presetModels" :key="m">
              <option :value="m" x-text="m"></option>
            </template>
            <option value="__custom__">Other (custom)...</option>
          </select>
          <input x-show="cfg.model === '__custom__' && name !== 'deepseek'" x-model="cfg._customModel" @input="cfg.model = $el.value" placeholder="Enter custom model name..."
            class="w-full border rounded-lg px-3 py-2 mt-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
          <label class="block text-xs font-medium text-gray-500 mb-1 mt-3">Reasoning effort</label>
          <select x-show="name === 'deepseek'" x-model="cfg.reasoningEffort"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
            <option value="high">high</option>
            <option value="max">max</option>
          </select>
          <select x-show="name !== 'deepseek'" x-model="cfg.reasoningEffort"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="xhigh">xhigh</option>
            <option value="max">max</option>
          </select>
          <button @click="testConnection(name)" :disabled="!cfg.apiKey || testing"
            class="mt-3 w-full px-2 py-1.5 rounded-lg text-xs font-medium transition disabled:opacity-40 disabled:cursor-not-allowed"
            :class="testResults[name] === 'ok' ? 'bg-green-100 text-green-700' : (testResults[name] === 'fail' ? 'bg-red-100 text-red-500' : 'bg-gray-100 text-gray-600 hover:bg-gray-200')">
            <span x-show="testingProvider !== name" x-text="'Test ' + name"></span>
            <span x-show="testingProvider === name" class="spinner"></span>
          </button>
        </div>
      </template>
      <button @click="saveSettings()" class="w-full px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition">Save</button>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-4 py-2 flex items-center justify-between shrink-0 z-10">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold text-gray-800">Meeting Flow</h1>
      <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">v0.4</span>
    </div>
    <div class="flex items-center gap-2">
      <button @click="loadDemo()" class="px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">Load Demo</button>
      <button @click="showSettings=true" class="px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">Settings</button>
      <div class="w-px h-5 bg-gray-200"></div>
      <button @click="viewMode='card'" class="px-3 py-1.5 text-xs font-medium rounded-lg transition" :class="viewMode==='card' ? 'bg-blue-100 text-blue-700' : 'text-gray-500 hover:bg-gray-100'">Cards</button>
      <button @click="viewMode='timeline'" class="px-3 py-1.5 text-xs font-medium rounded-lg transition" :class="viewMode==='timeline' ? 'bg-blue-100 text-blue-700' : 'text-gray-500 hover:bg-gray-100'">Timeline</button>
      <div class="w-px h-5 bg-gray-200"></div>
      <button @click="exportJSON()" class="px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">Export JSON</button>
      <button @click="exportImage()" class="px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">Export Image</button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Left: Chat Panel -->
    <div class="w-[35%] min-w-[360px] border-r border-gray-200 bg-white flex flex-col">
      <div class="p-3 border-b border-gray-100 bg-gray-50">
        <p class="text-xs text-gray-500 mb-2">Paste WeChat registration text below, then chat to fine-tune the agenda.</p>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-3" id="chatMessages" x-ref="chatContainer">
        <template x-for="msg in messages" :key="msg.id">
          <div class="chat-message">
            <!-- System/Info message -->
            <div x-show="msg.role==='info'" class="flex justify-center">
              <span class="text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full" x-text="msg.content"></span>
            </div>
            <!-- User message -->
            <div x-show="msg.role==='user'" class="flex justify-end">
              <div class="max-w-[85%] bg-blue-500 text-white rounded-2xl rounded-br-md px-4 py-2 text-sm whitespace-pre-wrap" x-text="msg.content"></div>
            </div>
            <!-- Assistant message -->
            <div x-show="msg.role==='assistant'" class="flex justify-start">
              <div class="max-w-[90%] bg-gray-100 text-gray-800 rounded-2xl rounded-bl-md px-4 py-2 text-sm">
                <!-- Tool call badge -->
                <div x-show="msg.isToolCall" class="mb-1">
                  <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium"
                    x-text="'🔧 ' + msg.toolCallName"></span>
                </div>
                <!-- Thinking process (collapsible) -->
                <details x-show="msg.thinking" class="thinking-section" :open="msg.showThinking" @toggle="msg.showThinking=$el.open">
                  <summary>Thought Process</summary>
                  <div class="thinking-content" x-text="msg.thinking"></div>
                </details>
                <!-- Main content (markdown) -->
                <div x-show="msg.content && !msg.isJson"
                  class="markdown-body"
                  :class="{ 'streaming-cursor': msg.streaming }"
                  x-html="renderMarkdown(msg.content)"></div>
                <!-- Main content (JSON with syntax highlighting) -->
                <div x-show="msg.content && msg.isJson" class="json-content" x-html="highlightJson(msg.content)"></div>
                <div x-show="!msg.content && !msg.thinking" class="flex items-center gap-2">
                  <span class="spinner"></span>
                  <span class="text-xs text-gray-400">Thinking...</span>
                </div>
                <div x-show="msg.segments" class="mt-2 text-xs text-green-600 font-medium">
                  Updated: <span x-text="msg.segments + ' segments'"></span>
                </div>
                <template x-if="msg.info">
                  <div class="mt-1 text-[10px] text-gray-400">
                    <span x-text="msg.info.provider"></span> ·
                    <span x-text="msg.info.model"></span> ·
                    <span x-text="msg.info.thinking ? 'effort: ' + msg.info.effort : 'thinking off'"></span> ·
                    <span x-text="msg.info.elapsed"></span>
                  </div>
                </template>
                <div x-show="msg.error" class="mt-1 text-xs text-red-500" x-text="msg.error"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
      <!-- Resize handle -->
      <div class="resize-handle" :class="{ active: resizing }"
        @mousedown="startResize($event)"></div>
      <div class="p-3 border-t border-gray-200 flex flex-col" :style="'height:' + inputHeight + 'px'">
        <!-- Provider & Model selector -->
        <div class="flex items-center gap-2 mb-2 shrink-0">
          <select x-model="activeProvider" class="text-xs border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
            <template x-for="(cfg, name) in providers" :key="name">
              <option :value="name" x-text="name" :disabled="!cfg.apiKey"></option>
            </template>
          </select>
          <!-- Model select (non-DeepSeek): x-effect forces browser to re-sync displayed value -->
          <select x-show="activeProvider !== 'deepseek'"
            x-effect="syncSelect($el, providers[activeProvider])"
            @change="providers[activeProvider].model = $el.value"
            class="text-xs border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none flex-1">
            <template x-for="m in providers[activeProvider].presetModels" :key="m">
              <option :value="m" x-text="m"></option>
            </template>
            <option value="__custom__">Other (custom)...</option>
          </select>
          <span x-show="activeProvider === 'deepseek'" class="text-xs text-gray-500 px-2 py-1 flex-1">model1</span>
          <input x-show="activeProvider !== 'deepseek' && providers[activeProvider].model === '__custom__'"
            x-model="providers[activeProvider]._customModel"
            @input="providers[activeProvider].model = $el.value"
            placeholder="Custom model..."
            class="text-xs border rounded-md px-2 py-1 flex-1 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none">
          <label class="flex items-center gap-1.5 select-none"
            :class="mustThink(activeProvider, providers[activeProvider].model) ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'"
            :title="mustThink(activeProvider, providers[activeProvider].model) ? 'This model always thinks' : 'Enable thinking'">
            <div class="relative">
              <input type="checkbox"
                :checked="effectiveThinking(activeProvider, providers[activeProvider])"
                @change="providers[activeProvider].thinkingEnabled = $el.checked"
                :disabled="mustThink(activeProvider, providers[activeProvider].model)"
                class="sr-only peer">
              <div class="w-8 h-4 bg-gray-300 peer-checked:bg-blue-500 rounded-full transition"></div>
              <div class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition peer-checked:translate-x-4"></div>
            </div>
            <span class="text-xs text-gray-600">think</span>
          </label>
          <select x-show="activeProvider === 'deepseek'"
            x-model="providers[activeProvider].reasoningEffort"
            :disabled="!effectiveThinking(activeProvider, providers[activeProvider])"
            title="Reasoning effort"
            class="text-xs border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none disabled:opacity-40 disabled:cursor-not-allowed">
            <option value="high">high</option>
            <option value="max">max</option>
          </select>
          <select x-show="activeProvider !== 'deepseek'"
            x-model="providers[activeProvider].reasoningEffort"
            :disabled="!effectiveThinking(activeProvider, providers[activeProvider])"
            title="Reasoning effort"
            class="text-xs border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none disabled:opacity-40 disabled:cursor-not-allowed">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="xhigh">xhigh</option>
            <option value="max">max</option>
          </select>
        </div>
        <div class="flex gap-2 flex-1">
          <textarea x-model="chatInput" @keydown.enter.prevent="handleEnter($event)"
            placeholder="Paste WeChat text or type adjustment... (Enter to send, Shift+Enter for new line)"
            class="flex-1 border rounded-xl px-4 py-2 text-sm resize-y focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none"
            rows="5" :disabled="loading"></textarea>
          <button @click="sendMessage()" x-show="!loading" :disabled="!chatInput.trim()"
            class="shrink-0 w-10 h-10 bg-blue-500 text-white rounded-full flex items-center justify-center hover:bg-blue-600 disabled:opacity-40 disabled:cursor-not-allowed transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <button @click="stopGeneration()" x-show="loading"
            class="shrink-0 w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><rect x="5" y="5" width="10" height="10" rx="2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Right: Visualization -->
    <div class="flex-1 overflow-y-auto p-4 bg-gray-50" id="vizPanel" x-ref="vizPanel">
      <!-- Empty State -->
      <div x-show="!meeting.segments.length" class="h-full flex items-center justify-center">
        <div class="text-center text-gray-400">
          <svg class="w-16 h-16 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <p class="text-sm">No agenda yet.</p>
          <p class="text-xs mt-1">Paste WeChat registration text in the chat panel.</p>
        </div>
      </div>

      <!-- Meeting Meta -->
      <div x-show="meeting.segments.length" class="mb-4 bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="font-bold text-gray-800" x-text="'#' + meeting.meta.no + ' ' + meeting.meta.theme" x-show="meeting.meta.theme"></h2>
            <h2 class="font-bold text-gray-800" x-text="meeting.meta.type + ' Meeting'" x-show="!meeting.meta.theme"></h2>
            <div class="flex gap-4 mt-1 text-xs text-gray-500">
              <span x-show="meeting.meta.date" x-text="meeting.meta.date"></span>
              <span x-text="meeting.meta.startTime + ' - ' + meeting.meta.endTime"></span>
              <span x-show="meeting.meta.manager" x-text="'MM: ' + meeting.meta.manager"></span>
            </div>
          </div>
          <div class="text-right text-xs text-gray-400">
            <div x-text="segmentCount + ' segments'"></div>
            <div x-text="totalDuration + ' min'"></div>
          </div>
        </div>
      </div>

      <!-- Card View -->
      <div x-show="viewMode==='card' && meeting.segments.length" id="segmentList">
        <template x-for="item in timelineItems" :key="item.key">
          <div
            :data-kind="item.kind"
            :data-seg-idx="item.segIdx"
            :data-seg-id="item.kind === 'card' ? item.seg.id : null"
            :class="item.kind === 'card'
              ? 'segment-card rounded-lg p-3 my-1 shadow-sm border-l-4 flex items-center gap-3 transition ' + (item.seg.bufferBefore < 0 ? 'bg-red-50 ring-1 ring-red-300' : 'bg-white')
              : 'segment-buffer select-none'"
            :style="item.kind === 'card' ? ('border-left-color: ' + (item.seg.bufferBefore < 0 ? '#ef4444' : item.seg.color)) : ''"
            :title="item.kind === 'card' && item.seg.bufferBefore < 0 ? 'Overlaps previous segment by ' + Math.abs(item.seg.bufferBefore) + ' min' : ''">
            <!-- Buffer visual: compact horizontal divider with a pill in the middle. -->
            <template x-if="item.kind === 'buffer'">
              <div class="flex items-center gap-2 px-3">
                <div class="flex-1 h-px bg-slate-200"></div>
                <div class="text-[10px] font-medium text-slate-500 px-2 py-0.5 rounded-full bg-slate-50 leading-none" x-text="item.minutes + ' min'"></div>
                <div class="flex-1 h-px bg-slate-200"></div>
              </div>
            </template>
            <!-- Card visual: time | type+role | duration | drag handle. -->
            <template x-if="item.kind === 'card'">
              <div class="flex items-center gap-3 w-full">
                <div class="shrink-0 w-12 text-center">
                  <div class="text-xs text-gray-400" x-text="item.seg.startTime"></div>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-gray-800 truncate" x-text="item.seg.type"></span>
                  </div>
                  <div class="text-xs text-gray-500" x-text="item.seg.roleTaker || 'No role taker'"></div>
                </div>
                <div class="shrink-0 text-right">
                  <span class="text-xs font-medium text-gray-600 bg-gray-100 px-2 py-1 rounded" x-text="item.seg.duration + ' min'"></span>
                </div>
                <div class="shrink-0 text-gray-300 cursor-grab">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M7 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM13 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM7 8a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM13 8a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM7 14a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM13 14a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Timeline View -->
      <div x-show="viewMode==='timeline' && meeting.segments.length" class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <div class="relative" style="padding-top: 20px;">
          <!-- Time axis -->
          <div class="relative h-8 mb-1 border-b border-gray-200">
            <template x-for="tick in timelineTicks" :key="tick.label">
              <div class="absolute text-[10px] text-gray-400 -top-4" :style="'left:' + tick.pct + '%'">
                <div class="w-px h-2 bg-gray-300 absolute top-3 left-1/2"></div>
                <span x-text="tick.label"></span>
              </div>
            </template>
          </div>
          <!-- Timeline rows -->
          <div class="space-y-1">
            <template x-for="seg in meeting.segments" :key="seg.id">
              <div class="relative h-8 group">
                <div class="timeline-bar absolute rounded-sm h-6 top-1 flex items-center px-2 overflow-hidden"
                  :style="'left:' + seg._timelinePct + '%; width:' + Math.max(seg._timelineWidth, 1) + '%; background-color:' + seg.color">
                  <span class="text-[10px] text-white font-medium truncate drop-shadow" x-text="seg.type"></span>
                </div>
                <!-- Tooltip on hover -->
                <div class="hidden group-hover:block absolute -top-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-[10px] px-2 py-1 rounded whitespace-nowrap z-10"
                  x-text="seg.type + ' | ' + seg.startTime + ' | ' + seg.duration + 'min | ' + (seg.roleTaker || 'N/A')"></div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Status Bar -->
  <footer class="bg-white border-t border-gray-200 px-4 py-1.5 flex items-center justify-between text-xs text-gray-400 shrink-0">
    <span x-show="meeting.segments.length" x-text="'Total: ' + totalDuration + ' min | ' + segmentCount + ' segments'"></span>
    <span x-show="!meeting.segments.length">Ready</span>
    <span x-show="providers[activeProvider].apiKey" class="text-green-500" x-text="activeProvider + ' configured'"></span>
    <span x-show="!providers[activeProvider].apiKey" class="text-yellow-600">API not configured</span>
  </footer>

<script>
function meetingApp() {
  const SEGMENT_DEFAULTS = [
    // Colors group roles: green=Host, violet=Facilitators, orange=Speakers, yellow=Evaluators, slate=Misc.
    { type: "Guests Registration", defaultDuration: 15, isOptional: false, color: "#94a3b8" },
    { type: "Meeting Rules Introduction (SAA)", defaultDuration: 2, isOptional: false, color: "#8b5cf6" },
    { type: "Opening Remarks", defaultDuration: 2, isOptional: false, color: "#8b5cf6" },
    { type: "TOM Introduction", defaultDuration: 2, isOptional: false, color: "#10b981" },
    { type: "Timer", defaultDuration: 2, isOptional: false, color: "#8b5cf6" },
    { type: "Grammarian", defaultDuration: 2, isOptional: true, color: "#8b5cf6" },
    { type: "Hark Master", defaultDuration: 1, isOptional: true, color: "#8b5cf6" },
    { type: "Aha Counter", defaultDuration: 1, isOptional: true, color: "#8b5cf6" },
    { type: "Guests Self Introduction", defaultDuration: 5, isOptional: false, color: "#10b981" },
    { type: "TTM Opening", defaultDuration: 2, isOptional: false, color: "#10b981" },
    { type: "Table Topic Session", defaultDuration: 20, isOptional: false, color: "#10b981" },
    { type: "Workshop", defaultDuration: 25, isOptional: true, color: "#f97316" },
    { type: "Prepared Speech", defaultDuration: 7, isOptional: true, color: "#f97316" },
    { type: "Tea Break & Group Photos", defaultDuration: 10, isOptional: false, color: "#94a3b8" },
    { type: "Table Topic Evaluation", defaultDuration: 7, isOptional: false, color: "#eab308" },
    { type: "Prepared Speech Evaluation", defaultDuration: 3, isOptional: true, color: "#eab308" },
    { type: "Grammarian Report", defaultDuration: 2, isOptional: true, color: "#8b5cf6" },
    { type: "Aha Counter Report", defaultDuration: 2, isOptional: true, color: "#8b5cf6" },
    { type: "Timer Report", defaultDuration: 2, isOptional: false, color: "#8b5cf6" },
    { type: "Hark Master Pop Quiz", defaultDuration: 5, isOptional: true, color: "#8b5cf6" },
    { type: "General Evaluation", defaultDuration: 8, isOptional: false, color: "#eab308" },
    { type: "Voting Section", defaultDuration: 2, isOptional: false, color: "#94a3b8" },
    { type: "Moment of Truth", defaultDuration: 7, isOptional: false, color: "#10b981" },
    { type: "Awards", defaultDuration: 2, isOptional: false, color: "#94a3b8" },
    { type: "Closing Remarks", defaultDuration: 1, isOptional: false, color: "#94a3b8" }
  ];

  // CLUB_MEMBERS, prompts are defined in prompts.js

  return {
    meeting: {
      meta: { no: null, type: "Regular", theme: "", manager: "", date: "", startTime: "19:15", endTime: "21:30", location: "", introduction: "" },
      segments: []
    },
    messages: [],
    chatInput: "",
    loading: false,
    streamingMsg: null,
    inputHeight: 180,
    resizing: false,
    viewMode: "card",
    showSettings: false,
    testing: false,
    testingProvider: null,
    testResults: {},
    settingsMsg: "",
    settingsError: false,
    sortableInstance: null,
    abortController: null,
    activeProvider: localStorage.getItem("mf_activeProvider") || "deepseek",
    providers: {
      deepseek: {
        apiKey: "",
        baseUrl: localStorage.getItem("mf_ds_baseUrl") || "https://api.deepseek.com",
        model: localStorage.getItem("mf_ds_model") || "model1",
        reasoningEffort: localStorage.getItem("mf_ds_effort") || "max",
        thinkingEnabled: localStorage.getItem("mf_ds_thinking") !== "false",
        presetModels: ["model1"]
      },
      openai: {
        apiKey: "",
        baseUrl: localStorage.getItem("mf_oai_baseUrl") || "https://api.openai.com",
        model: localStorage.getItem("mf_oai_model") || "gpt-5.4-nano",
        reasoningEffort: localStorage.getItem("mf_oai_effort") || "high",
        thinkingEnabled: localStorage.getItem("mf_oai_thinking") !== "false",
        presetModels: ["gpt-5.4", "gpt-5.4-mini", "gpt-5.4-nano", "o3", "o3-mini", "o4-mini"]
      },
      anthropic: {
        apiKey: "",
        baseUrl: localStorage.getItem("mf_anth_baseUrl") || "https://api.anthropic.com",
        model: localStorage.getItem("mf_anth_model") || "claude-haiku-4-5",
        reasoningEffort: localStorage.getItem("mf_anth_effort") || "high",
        thinkingEnabled: localStorage.getItem("mf_anth_thinking") !== "false",
        presetModels: ["claude-opus-4-7", "claude-sonnet-4-6", "claude-haiku-4-5"]
      },
      gemini: {
        apiKey: "",
        baseUrl: localStorage.getItem("mf_gem_baseUrl") || "https://generativelanguage.googleapis.com/v1beta",
        model: localStorage.getItem("mf_gem_model") || "gemini-2.5-flash-lite",
        reasoningEffort: localStorage.getItem("mf_gem_effort") || "high",
        thinkingEnabled: localStorage.getItem("mf_gem_thinking") !== "false",
        presetModels: ["gemini-3.1-pro-preview", "gemini-3-flash-preview", "gemini-2.5-flash-lite", "gemini-3-deep-think"]
      }
    },

    init() {
      // Load API keys from localStorage
      ["deepseek","openai","anthropic","gemini"].forEach(p => {
        const key = localStorage.getItem("mf_"+p+"_key");
        if (key) this.providers[p].apiKey = key;
      });
      this.$watch("meeting.segments", () => {
        this.$nextTick(() => this.initSortable());
        this.updateTimelinePositions();
      });
      this.$watch("viewMode", () => {
        if (this.viewMode === "timeline") this.$nextTick(() => this.updateTimelinePositions());
      });
    },

    get segmentCount() { return this.meeting.segments.length; },
    get totalDuration() {
      if (!this.meeting.segments.length) return 0;
      const last = this.meeting.segments[this.meeting.segments.length - 1];
      const [sh, sm] = (this.meeting.meta.startTime || "19:15").split(":").map(Number);
      const [eh, em] = (last.startTime || "19:15").split(":").map(Number);
      return (eh * 60 + em + last.duration) - (sh * 60 + sm);
    },
    get timelineItems() {
      // Flat list of card+buffer items rendered in order as segmentList children.
      // A buffer item appears between consecutive cards when bufferBefore > 0.
      // Overlaps (bufferBefore < 0) are shown as conflict styling on the card, not as a buffer item.
      const items = [];
      this.meeting.segments.forEach((seg, idx) => {
        if (idx > 0 && seg.bufferBefore > 0) {
          items.push({ kind: "buffer", segIdx: idx, minutes: seg.bufferBefore, key: "buf-" + seg.id });
        }
        items.push({ kind: "card", segIdx: idx, seg, key: seg.id });
      });
      return items;
    },
    get timelineTicks() {
      if (!this.meeting.segments.length) return [];
      const startSeg = this.meeting.segments[0];
      const lastSeg = this.meeting.segments[this.meeting.segments.length - 1];
      const [sh, sm] = startSeg.startTime.split(":").map(Number);
      const [eh, em] = lastSeg.startTime.split(":").map(Number);
      const startMin = sh * 60 + sm;
      const endMin = eh * 60 + em + lastSeg.duration;
      const total = endMin - startMin;
      const ticks = [];
      const step = total > 120 ? 30 : 15;
      for (let m = 0; m <= total; m += step) {
        const absMin = startMin + m;
        const h = Math.floor(absMin / 60);
        const min = absMin % 60;
        ticks.push({ label: h + ":" + String(min).padStart(2, "0"), pct: (m / total) * 100 });
      }
      return ticks;
    },

    updateTimelinePositions() {
      if (!this.meeting.segments.length) return;
      const startSeg = this.meeting.segments[0];
      const lastSeg = this.meeting.segments[this.meeting.segments.length - 1];
      const [sh, sm] = startSeg.startTime.split(":").map(Number);
      const [eh, em] = lastSeg.startTime.split(":").map(Number);
      const startMin = sh * 60 + sm;
      const endMin = eh * 60 + em + lastSeg.duration;
      const total = endMin - startMin;
      this.meeting.segments.forEach(seg => {
        const [h, m] = seg.startTime.split(":").map(Number);
        const segStart = h * 60 + m;
        seg._timelinePct = ((segStart - startMin) / total) * 100;
        seg._timelineWidth = (seg.duration / total) * 100;
      });
    },

    initSortable() {
      const el = document.getElementById("segmentList");
      if (!el) return;
      if (this.sortableInstance) this.sortableInstance.destroy();
      // Customize HTML5 drag image: clone the card, strip Alpine directives so appending to
      // <body> doesn't trigger "item is not defined" errors (the clone is outside the x-for
      // scope), style it semi-transparent so the user can see cards underneath.
      if (!this._dragStartHandler) {
        this._dragStartHandler = (e) => {
          const card = e.target && e.target.closest && e.target.closest(".segment-card");
          if (!card || !el.contains(card) || !e.dataTransfer) return;
          const clone = card.cloneNode(true);
          const stripAlpine = (node) => {
            if (node.nodeType !== 1) return;
            for (const attr of Array.from(node.attributes)) {
              const n = attr.name;
              if (n.startsWith("x-") || n.startsWith(":") || n.startsWith("@")) node.removeAttribute(n);
            }
            for (const child of Array.from(node.children)) stripAlpine(child);
          };
          stripAlpine(clone);
          Object.assign(clone.style, {
            position: "absolute", top: "-9999px", left: "-9999px",
            width: card.offsetWidth + "px",
            opacity: "0.75", background: "#ffffff",
            boxShadow: "0 8px 20px rgba(0,0,0,0.2)",
            borderRadius: "8px", pointerEvents: "none"
          });
          document.body.appendChild(clone);
          const rect = card.getBoundingClientRect();
          e.dataTransfer.setDragImage(clone, e.clientX - rect.left, e.clientY - rect.top);
          setTimeout(() => clone.remove(), 0);
        };
        el.addEventListener("dragstart", this._dragStartHandler, true);
      }
      this.sortableInstance = Sortable.create(el, {
        animation: 0,                           // no anim needed; DOM doesn't reorder during drag.
        draggable: ".segment-card",             // only cards are sortable items; buffers are static siblings.
        ghostClass: "sortable-ghost",
        chosenClass: "sortable-chosen",
        onStart: (evt) => {
          // Freeze the layout: snapshot children once; onMove below cancels all reorders.
          this._dragChildren = Array.from(el.children).filter(c => c !== this._dropLine);
          this._dropZone = null;
          if (!this._dropLine) {
            this._dropLine = document.createElement("div");
            this._dropLine.className = "drop-line";
          }
        },
        onMove: (evt) => {
          const mouseY = evt.originalEvent && evt.originalEvent.clientY;
          const children = this._dragChildren;
          if (mouseY == null || !children || !children.length) return false;

          // Zone k = "insert before children[k]"; zone = children.length = "after last".
          // Pick the first child whose vertical midpoint is below the mouse.
          let zone = children.length;
          for (let i = 0; i < children.length; i++) {
            const rect = children[i].getBoundingClientRect();
            if (mouseY < rect.top + rect.height / 2) { zone = i; break; }
          }
          this._dropZone = { zone };

          // Draw drop-line at the top of children[zone] (or below the last element).
          if (!this._dropLine.parentElement) el.appendChild(this._dropLine);
          let topPx;
          if (zone >= children.length) {
            const last = children[children.length - 1];
            topPx = last ? last.offsetTop + last.offsetHeight : 0;
          } else if (zone === 0) {
            topPx = children[0].offsetTop - 2;
          } else {
            topPx = children[zone].offsetTop;
          }
          this._dropLine.style.top = topPx + "px";

          return false;                         // cancel Sortable's live DOM reorder.
        },
        onEnd: (evt) => {
          if (this._dropLine && this._dropLine.parentElement) this._dropLine.remove();

          const children = this._dragChildren;
          const dropZone = this._dropZone;
          this._dragChildren = null;
          this._dropZone = null;
          if (!children || !dropZone) return;
          const { zone } = dropZone;

          // Because onMove always returned false, evt.item is still in its original DOM slot.
          const draggedDomIdx = children.indexOf(evt.item);
          if (draggedDomIdx < 0) return;

          // No-op if drop zone is at the dragged card's current slot (before or immediately after itself).
          if (zone === draggedDomIdx || zone === draggedDomIdx + 1) return;

          // Build the target DOM sequence: remove dragged item, then splice it in at the target zone.
          const seq = children.slice();
          seq.splice(draggedDomIdx, 1);
          const adjustedZone = zone > draggedDomIdx ? zone - 1 : zone;
          seq.splice(adjustedZone, 0, evt.item);

          // Walk the sequence to produce the new segments[], accumulating consecutive buffers
          // into the next card's bufferBefore. Capture bufferBefore values up-front to avoid a
          // read-after-write bug when a card appears before its own "buf→self" entry in seq.
          const oldSegs = this.meeting.segments;
          const origBuffers = oldSegs.map(s => s.bufferBefore || 0);

          const newSegs = [];
          let pendingBuffer = 0;
          for (const child of seq) {
            const kind = child.dataset.kind;
            if (kind === "buffer") {
              const bufSegIdx = parseInt(child.dataset.segIdx);
              if (!isNaN(bufSegIdx) && oldSegs[bufSegIdx]) {
                pendingBuffer += origBuffers[bufSegIdx];
              }
            } else if (kind === "card") {
              const cardSegIdx = parseInt(child.dataset.segIdx);
              const seg = oldSegs[cardSegIdx];
              if (seg) {
                seg.bufferBefore = pendingBuffer;
                newSegs.push(seg);
                pendingBuffer = 0;
              }
            }
          }

          // FLIP animation: capture each card's current bbox (keyed by stable seg.id),
          // mutate state, then after Alpine rerender apply an inverse transform and transition
          // it back to zero — the browser animates position change smoothly.
          const firstRects = new Map();
          for (const card of el.querySelectorAll(".segment-card[data-seg-id]")) {
            firstRects.set(card.dataset.segId, card.getBoundingClientRect());
          }

          // Use splice() to mutate the array in place — Alpine reactivity picks up ordered
          // changes more reliably than a fresh assignment (which can leave the DOM stale if
          // Sortable's post-drop cleanup races with the re-render).
          this.meeting.segments.splice(0, this.meeting.segments.length, ...newSegs);
          if (this.meeting.segments[0]) this.meeting.segments[0].bufferBefore = 0;

          this.cascadeStartTimes();
          this.refreshDerivedState();

          this.$nextTick(() => {
            const cards = el.querySelectorAll(".segment-card[data-seg-id]");
            const draggedId = evt.item && evt.item.dataset && evt.item.dataset.segId;
            for (const card of cards) {
              const oldRect = firstRects.get(card.dataset.segId);
              if (!oldRect) continue;
              const newRect = card.getBoundingClientRect();
              const dy = oldRect.top - newRect.top;
              if (Math.abs(dy) < 1) continue;
              // Stack dragged card behind the others so downward insertion looks the same as
              // upward insertion — the moving card slides "behind" its siblings instead of
              // sitting on top of them (which is the natural DOM order).
              card.style.position = "relative";
              card.style.zIndex = card.dataset.segId === draggedId ? "0" : "1";
              card.style.transition = "none";
              card.style.transform = "translateY(" + dy + "px)";
              card.offsetHeight;                                       // force reflow to commit the invert
              card.style.transition = "transform 1000ms cubic-bezier(.2,.7,.3,1)";
              card.style.transform = "";
            }
            setTimeout(() => {
              for (const card of cards) {
                card.style.transition = ""; card.style.transform = "";
                card.style.position = ""; card.style.zIndex = "";
              }
            }, 1050);
          });
        },
        onUnchoose: (evt) => {
          // NOTE: With onMove always returning false, Sortable fires `unchoose` BEFORE `end`
          // (Sortable treats the drag as "no valid target" → cancel path). DO NOT clear
          // _dragChildren / _dropZone here — onEnd needs to read them. Only clean up the
          // drop-line DOM element, which doesn't have this dependency.
          if (this._dropLine && this._dropLine.parentElement) this._dropLine.remove();
        }
      });
    },

    refreshDerivedState() {
      // Recompute meta.endTime from the last segment and refresh timeline bars.
      // Does NOT overwrite per-segment start times — those come from the LLM or the user.
      if (!this.meeting.segments.length) {
        this.updateTimelinePositions();
        return;
      }
      const last = this.meeting.segments[this.meeting.segments.length - 1];
      if (last && last.startTime) {
        const [lh, lm] = last.startTime.split(":").map(Number);
        const endMin = lh * 60 + lm + (last.duration || 0);
        this.meeting.meta.endTime = String(Math.floor(endMin / 60)).padStart(2, "0") + ":" + String(endMin % 60).padStart(2, "0");
      }
      this.updateTimelinePositions();
    },

    gapInfo(idx) {
      // Minutes between segment[idx-1].end and segment[idx].start.
      // null: first segment / missing times; 0: back-to-back; >0: buffer or gap; <0: overlap.
      if (idx === 0) return null;
      const segs = this.meeting.segments;
      const prev = segs[idx - 1];
      const cur = segs[idx];
      if (!prev || !cur || !prev.startTime || !cur.startTime) return null;
      const [ph, pm] = prev.startTime.split(":").map(Number);
      const [ch, cm] = cur.startTime.split(":").map(Number);
      return (ch * 60 + cm) - (ph * 60 + pm + (prev.duration || 0));
    },

    async sendMessage() {
      const text = this.chatInput.trim();
      if (!text || this.loading) return;
      this.chatInput = "";

      this.messages.push({ id: Date.now(), role: "user", content: text });

      const providerCfg = this.providers[this.activeProvider];
      if (!providerCfg || !providerCfg.apiKey) {
        this.messages.push({ id: Date.now() + 1, role: "assistant", content: "Please configure your API key in Settings first. Or click 'Load Demo' to see an example." });
        this.scrollChat(true);
        return;
      }

      const msgId = Date.now() + 1;
      const startTime = Date.now();
      const reqModel = providerCfg.model;
      const reqEffort = providerCfg.reasoningEffort || "high";
      const reqProvider = this.activeProvider;
      const reqThinking = effectiveThinking(reqProvider, providerCfg);

      // Single bubble reused by router and executor — badge + streaming JSON land on the same message.
      this.streamingMsg = {
        id: msgId, role: "assistant",
        content: "", thinking: "", showThinking: true,
        streaming: true, isJson: false
      };
      this.messages.push(this.streamingMsg);
      this.loading = true;
      this.scrollChat(true);

      if (this.abortController) this.abortController.abort();
      this.abortController = new AbortController();

      try {
        const onThinking = (chunk) => { this.streamingMsg.thinking += chunk; this.scrollChat(); };
        const onContent = (chunk) => { this.streamingMsg.content += chunk; this.scrollChat(); };

        // Router: SYSTEM_PROMPT + full history (streamingMsg is streaming:true so it's filtered out).
        // Inject the LIVE agenda snapshot at the HEAD of the current user turn only — so the router
        // always sees the authoritative frontend state (reflecting any manual edits) without
        // busting prompt-cache prefixes on SYSTEM_PROMPT / tools / prior turns.
        const history = buildHistoryForProvider(this.messages, reqProvider);
        if (this.meeting.segments.length && history.length) {
          const snapshot = "[Current agenda (live frontend state — trust this over any earlier tool_result):\n" +
            JSON.stringify({
              meta: this.meeting.meta,
              segments: this.meeting.segments.map(s => ({ type: s.type, startTime: s.startTime, duration: s.duration, roleTaker: s.roleTaker }))
            }, null, 2) + "\n]\n\n";
          const last = history[history.length - 1];
          if (typeof last.content === "string") {
            last.content = snapshot + last.content;
          } else if (last.parts && last.parts[0] && typeof last.parts[0].text === "string") {
            last.parts[0].text = snapshot + last.parts[0].text;
          }
        }
        const r1 = await this.callLLMStreaming(
          SYSTEM_PROMPT, null, onThinking, onContent,
          this.abortController.signal,
          { includeTools: true, history }
        );

        if (r1.toolCalls && r1.toolCalls.length) {
          for (let i = 0; i < r1.toolCalls.length; i++) {
            const tc = r1.toolCalls[i];

            // First tool call reuses the current streamingMsg; subsequent ones create fresh bubbles.
            let bubble = this.streamingMsg;
            if (i > 0) {
              bubble = {
                id: Date.now() + 100 + i, role: "assistant",
                content: "", thinking: "", showThinking: true,
                streaming: true, isJson: true
              };
              this.messages.push(bubble);
              this.streamingMsg = bubble;
              this.scrollChat(true);
            }

            // Attach tool_use metadata (consumed by buildHistoryForProvider on the next turn).
            bubble.isToolCall = true;
            bubble.toolCallId = tc.id;
            bubble.toolCallName = tc.name;
            bubble.toolCallArgs = tc.args;
            bubble.thinkingBlocks = (i === 0 ? r1.thinkingBlocks : []) || [];
            bubble.content = "";
            bubble.isJson = true;

            const toolResult = await this.executeToolCall(tc, onThinking, onContent);

            this.messages.push({
              id: Date.now() + 1000 + i,
              role: "tool",
              toolCallId: tc.id,
              toolCallName: tc.name,
              toolResult
            });
          }
        } else {
          // No tool call: parse JSON for backward compatibility, else plain chat.
          const parsed = this.parseJSON(r1.content);
          if (parsed && (parsed.segments || parsed.meta)) {
            this.streamingMsg.isJson = true;
            this.applyAgendaJSON(parsed);
            this.streamingMsg.content = JSON.stringify(parsed, null, 2);
          } else {
            this.streamingMsg.isJson = false;
          }
        }

        this.streamingMsg.streaming = false;
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + "s";
        this.streamingMsg.info = { provider: reqProvider, model: reqModel, effort: reqEffort, thinking: reqThinking, elapsed };
      } catch (e) {
        this.streamingMsg.streaming = false;
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + "s";
        this.streamingMsg.info = { provider: reqProvider, model: reqModel, effort: reqEffort, thinking: reqThinking, elapsed };
        if (e.name === "AbortError") {
          this.streamingMsg.content = this.streamingMsg.content || "[Request cancelled]";
        } else {
          this.streamingMsg.content = this.streamingMsg.content || "Error occurred.";
          this.streamingMsg.error = e.message;
        }
      } finally {
        this.loading = false;
        this.abortController = null;
        this.scrollChat();
      }
    },

    async executeToolCall(tc, onThinking, onContent) {
      // Executor path: legacy prompts, NO tools (the inner call just generates JSON).
      // Streams into the same onThinking/onContent callbacks so the badge bubble shows live output.
      try {
        if (tc.name === "create_meeting") {
          const userMsg = PLAN_MEETING_USER_PROMPT.replace("{text}", tc.args?.raw_text || "");
          const r = await this.callLLMStreaming(
            PLAN_MEETING_DEVELOPER_PROMPT, userMsg,
            onThinking, onContent, this.abortController.signal,
            { includeTools: false }
          );
          const parsed = this.parseJSON(r.content);
          if (!parsed) return { success: false, error: "Executor output was not valid JSON" };
          this.applyAgendaJSON(parsed);                                // create_meeting: no animation
          return { success: true, agenda: this.fullAgendaSnapshot() };
        }

        if (tc.name === "adjust_meeting") {
          const currentJSON = JSON.stringify({
            meta: this.meeting.meta,
            segments: this.meeting.segments.map(s => ({ type: s.type, startTime: s.startTime, duration: s.duration, roleTaker: s.roleTaker }))
          }, null, 2);
          // Keep the system prompt stable (cache-friendly) and put the dynamic agenda at the head of the user turn.
          const userMsg = "## Current Agenda (JSON)\n```json\n" + currentJSON + "\n```\n\n" +
            ADJUST_MEETING_USER_PROMPT.replace("{text}", tc.args?.request || "");
          const r = await this.callLLMStreaming(
            ADJUST_MEETING_DEVELOPER_PROMPT, userMsg,
            onThinking, onContent, this.abortController.signal,
            { includeTools: false }
          );
          const parsed = this.parseJSON(r.content);
          if (!parsed) return { success: false, error: "Executor output was not valid JSON" };
          this.applyAgendaJSON(parsed, { animate: true });             // adjust_meeting: FLIP + flash + fade
          return { success: true, agenda: this.fullAgendaSnapshot() };
        }

        return { success: false, error: "Unknown tool: " + tc.name };
      } catch (e) {
        if (e.name === "AbortError") throw e;
        return { success: false, error: e.message || String(e) };
      }
    },

    applyAgendaJSON(parsed, opts = {}) {
      if (!parsed) return;
      // opts.animate=true triggers FLIP (moved) / fade-in (added) / fade-out (removed) /
      // flash (content-changed) transitions. Used by adjust_meeting; create_meeting stays instant.
      const m = parsed.meta || parsed;
      this.meeting.meta = {
        ...this.meeting.meta,
        no: m.no ?? this.meeting.meta.no,
        type: m.type ?? this.meeting.meta.type,
        theme: m.theme ?? this.meeting.meta.theme,
        manager: m.manager ?? this.meeting.meta.manager,
        date: m.date ?? this.meeting.meta.date,
        startTime: m.startTime || m.start_time || this.meeting.meta.startTime,
        endTime: m.endTime || m.end_time || this.meeting.meta.endTime,
        location: m.location ?? this.meeting.meta.location,
        introduction: m.introduction ?? this.meeting.meta.introduction
      };
      if (!Array.isArray(parsed.segments)) {
        if (this.streamingMsg) this.streamingMsg.segments = this.meeting.segments.length;
        return;
      }
      // Defensive: drop any segment whose type is a buffer/gap placeholder.
      const realSegments = parsed.segments.filter(s => {
        const t = (s.type || "").toLowerCase().trim();
        return t && t !== "buffer" && t !== "gap" && t !== "间隔" && t !== "空档" && t !== "pause" && t !== "break time";
      });

      if (!opts.animate) {
        this.meeting.segments = realSegments.map((s, i) => this.enrichSegment(s, i));
        this.deriveBuffers();
        this.refreshDerivedState();
        if (this.streamingMsg) this.streamingMsg.segments = this.meeting.segments.length;
        return;
      }

      // --- Animated path ---
      const segmentListEl = document.getElementById("segmentList");
      const oldSegs = this.meeting.segments.slice();

      // 1. Capture old positions (by seg.id, using offsetTop — segmentList is position:relative).
      const oldPos = new Map();
      if (segmentListEl) {
        for (const card of segmentListEl.querySelectorAll(".segment-card[data-seg-id]")) {
          oldPos.set(card.dataset.segId, {
            top: card.offsetTop, left: card.offsetLeft,
            width: card.offsetWidth, height: card.offsetHeight
          });
        }
      }

      // 2. Position-tolerant match: same type matched in order. Matched new segs inherit old id.
      const buckets = new Map();
      for (const o of oldSegs) {
        if (!buckets.has(o.type)) buckets.set(o.type, []);
        buckets.get(o.type).push(o);
      }
      const matchedOldIds = new Set();
      const flashIds = new Set();
      const newIds = new Set();
      const newEnriched = realSegments.map((s, i) => {
        const enriched = this.enrichSegment(s, i);
        const bucket = buckets.get(s.type);
        if (bucket && bucket.length) {
          const matched = bucket.shift();
          enriched.id = matched.id;
          matchedOldIds.add(matched.id);
          const changed = (matched.roleTaker || "") !== (enriched.roleTaker || "")
                       || (matched.duration || 0) !== (enriched.duration || 0);
          if (changed) flashIds.add(matched.id);
        } else {
          newIds.add(enriched.id);
        }
        return enriched;
      });
      const removedSegs = oldSegs.filter(o => !matchedOldIds.has(o.id));

      // 3. Clone removed cards into segmentList overlay so Alpine can remove the originals
      //    while visuals keep showing — fade-out starts in $nextTick.
      const fadeClones = [];
      if (segmentListEl) {
        for (const r of removedSegs) {
          const pos = oldPos.get(r.id);
          const original = segmentListEl.querySelector('.segment-card[data-seg-id="' + r.id + '"]');
          if (!pos || !original) continue;
          const clone = original.cloneNode(true);
          // Strip Alpine bindings so the detached clone doesn't fight reactivity.
          const strip = (node) => {
            if (node.nodeType !== 1) return;
            for (const a of Array.from(node.attributes)) {
              const n = a.name;
              if (n.startsWith("x-") || n.startsWith(":") || n.startsWith("@")) node.removeAttribute(n);
            }
            for (const c of Array.from(node.children)) strip(c);
          };
          strip(clone);
          Object.assign(clone.style, {
            position: "absolute",
            top: pos.top + "px", left: pos.left + "px",
            width: pos.width + "px",
            zIndex: "2", pointerEvents: "none", margin: "0"
          });
          segmentListEl.appendChild(clone);
          fadeClones.push(clone);
        }
      }

      // 4. Apply new segments — Alpine will diff against reused ids, keeping matched DOM nodes.
      this.meeting.segments = newEnriched;
      this.deriveBuffers();
      this.refreshDerivedState();
      if (this.streamingMsg) this.streamingMsg.segments = this.meeting.segments.length;

      // 5. After Alpine rerender: FLIP moved cards, fade-in new cards, flash changed cards,
      //    trigger fade-out on clones.
      this.$nextTick(() => {
        const cards = segmentListEl ? segmentListEl.querySelectorAll(".segment-card[data-seg-id]") : [];
        for (const card of cards) {
          const id = card.dataset.segId;
          if (newIds.has(id)) {
            // Fade-in: start hidden + slightly offset, then release to normal.
            card.style.transition = "none";
            card.style.opacity = "0";
            card.style.transform = "translateY(-10px)";
            card.offsetHeight;
            card.style.transition = "opacity 800ms ease, transform 800ms ease";
            card.style.opacity = "";
            card.style.transform = "";
          } else {
            const op = oldPos.get(id);
            if (op) {
              const dy = op.top - card.offsetTop;
              if (Math.abs(dy) >= 1) {
                card.style.transition = "none";
                card.style.transform = "translateY(" + dy + "px)";
                card.offsetHeight;
                card.style.transition = "transform 800ms cubic-bezier(.2,.7,.3,1)";
                card.style.transform = "";
              }
            }
          }
          if (flashIds.has(id)) {
            card.classList.remove("card-flash");
            void card.offsetWidth;                                  // restart animation
            card.classList.add("card-flash");
          }
        }
        // Clone fade-out: trigger inside nextTick so originals are already removed by Alpine.
        for (const clone of fadeClones) {
          clone.style.transition = "opacity 800ms ease, transform 800ms ease";
          clone.style.opacity = "0";
          clone.style.transform = "translateY(10px)";
        }
        setTimeout(() => {
          for (const card of cards) {
            card.style.transition = ""; card.style.transform = ""; card.style.opacity = "";
            card.classList.remove("card-flash");
          }
          for (const clone of fadeClones) clone.remove();
        }, 850);
      });
    },

    fullAgendaSnapshot() {
      // Returned as tool_result payload. Full state (not a summary) so the router can
      // point to any previous turn's version — needed for "revert to the previous agenda"
      // style requests that would otherwise have no authoritative source to restore from.
      return {
        meta: {
          no: this.meeting.meta.no,
          type: this.meeting.meta.type,
          theme: this.meeting.meta.theme,
          manager: this.meeting.meta.manager,
          date: this.meeting.meta.date,
          startTime: this.meeting.meta.startTime,
          endTime: this.meeting.meta.endTime,
          location: this.meeting.meta.location,
          introduction: this.meeting.meta.introduction
        },
        segments: this.meeting.segments.map(s => ({
          type: s.type,
          startTime: s.startTime,
          duration: s.duration,
          roleTaker: s.roleTaker
        }))
      };
    },

    enrichSegment(s, idx) {
      const segType = s.type || "";
      // Color by keyword first — robust to LLM wording variations:
      //   "evaluation" → Evaluators (yellow); "speech" / "workshop" → Speakers (orange).
      // Everything else: exact match on SEGMENT_DEFAULTS (parentheticals stripped), fallback gray.
      const norm = (t) => (t || "").replace(/\s*\([^)]*\)\s*/g, " ").replace(/\s+/g, " ").trim();
      const lower = segType.toLowerCase();
      const def = SEGMENT_DEFAULTS.find(d => norm(d.type) === norm(segType)) || {};
      let color;
      if (lower.includes("evaluation")) color = "#eab308";
      else if (lower.includes("speech") || lower.includes("workshop")) color = "#f97316";
      else color = def.color || "#94a3b8";
      return {
        id: "seg_" + String(idx).padStart(3, "0") + "_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        type: segType,
        startTime: s.startTime || s.start_time || "",
        duration: parseInt(s.duration) || def.defaultDuration || 5,
        roleTaker: s.roleTaker || s.role_taker || "",
        bufferBefore: 0,  // derived in applyAgendaJSON after enrichment; updated on drag.
        isOptional: def.isOptional || false,
        color
      };
    },

    deriveBuffers() {
      // After segments[] is set with LLM-provided startTimes, compute bufferBefore for each.
      // bufferBefore[0] = 0 (first segment anchored to meta.startTime).
      // bufferBefore[i] = segments[i].startTime - (segments[i-1].startTime + segments[i-1].duration).
      // Result can be negative (overlap) or positive (gap); we store as-is.
      for (let i = 0; i < this.meeting.segments.length; i++) {
        const cur = this.meeting.segments[i];
        if (i === 0) { cur.bufferBefore = 0; continue; }
        const prev = this.meeting.segments[i - 1];
        if (!cur.startTime || !prev.startTime) { cur.bufferBefore = 0; continue; }
        const [ph, pm] = prev.startTime.split(":").map(Number);
        const [ch, cm] = cur.startTime.split(":").map(Number);
        cur.bufferBefore = (ch * 60 + cm) - (ph * 60 + pm + (prev.duration || 0));
      }
    },

    cascadeStartTimes() {
      // Rewrite every segment.startTime from meta.startTime anchor + chained (prev.duration + cur.bufferBefore).
      // Used after drag-and-drop reorder so total meeting time stays fixed.
      if (!this.meeting.segments.length) return;
      const anchor = this.meeting.meta.startTime || "19:15";
      const [startH, startM] = anchor.split(":").map(Number);
      let minutes = startH * 60 + startM;
      this.meeting.segments.forEach((seg, i) => {
        if (i > 0) minutes += (seg.bufferBefore || 0);
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        seg.startTime = String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
        minutes += (seg.duration || 0);
      });
    },

    syncSelect(el, cfg) {
      // Defer until after Alpine flushes <template x-for> so options exist before we assign.
      this.$nextTick(() => {
        if (el.value !== cfg.model) el.value = cfg.model;
      });
    },

    parseJSON(text) {
      let cleaned = text.replace(/```json\s?/gi, "").replace(/```\s?/g, "").trim();
      try { return JSON.parse(cleaned); } catch (e) {}
      const match = cleaned.match(/\{[\s\S]*\}/);
      if (match) {
        try { return JSON.parse(match[0]); } catch (e) {}
      }
      return null;
    },

    async callLLMStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts = {}) {
      if (this.activeProvider === "anthropic") {
        return this.callAnthropicStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts);
      }
      if (this.activeProvider === "gemini") {
        return this.callGeminiStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts);
      }
      return this.callOpenAIStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts);
    },

    async callOpenAIStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts = {}) {
      const cfg = this.providers[this.activeProvider];
      let messages;
      if (opts.history) {
        // Caller provides the full conversation; we still prepend system.
        messages = [{ role: "system", content: systemPrompt }, ...opts.history];
      } else {
        messages = [
          { role: "system", content: systemPrompt },
          { role: "user", content: userMessage || "Please generate the output." }
        ];
      }

      const includeTools = opts.includeTools !== false;
      const body = buildOpenAIBody(this.activeProvider, cfg, messages, true, includeTools);
      const res = await fetch(cfg.baseUrl.replace(/\/$/, "") + "/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + cfg.apiKey },
        body: JSON.stringify(body),
        signal
      });
      if (!res.ok) throw new Error("API error: " + res.status + " " + (await res.text()).substring(0, 200));

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      const state = createOpenAIState();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const { events, remainder } = parseSseLines(buffer);
        buffer = remainder;
        for (const ev of events) handleOpenAIChunk(state, ev, onThinking, onContent);
      }
      return finalizeOpenAIState(state);
    },

    async callAnthropicStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts = {}) {
      const cfg = this.providers[this.activeProvider];
      let msgs;
      if (opts.history) {
        msgs = [...opts.history];
      } else {
        msgs = [{ role: "user", content: userMessage || "Please process the request." }];
      }

      const includeTools = opts.includeTools !== false;
      const body = buildAnthropicBody(cfg, systemPrompt, msgs, true, includeTools);
      const res = await fetch(cfg.baseUrl.replace(/\/$/, "") + "/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": cfg.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify(body),
        signal
      });
      if (!res.ok) throw new Error("API error: " + res.status + " " + (await res.text()).substring(0, 200));

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      const state = createAnthropicState();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const { events, remainder } = parseSseLines(buffer);
        buffer = remainder;
        for (const ev of events) handleAnthropicEvent(state, ev, onThinking, onContent);
      }
      return finalizeAnthropicState(state);
    },

    async callGeminiStreaming(systemPrompt, userMessage, onThinking, onContent, signal, opts = {}) {
      const cfg = this.providers.gemini;
      let contents;
      if (opts.history) {
        contents = [...opts.history];
      } else {
        contents = [{ role: "user", parts: [{ text: userMessage || "Please process the request." }] }];
      }

      const includeTools = opts.includeTools !== false;
      const body = buildGeminiBody(cfg, systemPrompt, contents, includeTools);

      const url = cfg.baseUrl.replace(/\/$/, "") + "/models/" + cfg.model + ":streamGenerateContent?alt=sse&key=" + encodeURIComponent(cfg.apiKey);
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal
      });
      if (!res.ok) throw new Error("Gemini API error: " + res.status + " " + (await res.text()).substring(0, 200));

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      const state = createGeminiState();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const { events, remainder } = parseSseLines(buffer);
        buffer = remainder;
        for (const ev of events) handleGeminiChunk(state, ev, onThinking, onContent);
      }
      return finalizeGeminiState(state);
    },

    async callGemini(systemPrompt, userMessage) {
      const cfg = this.providers.gemini;
      const contents = [];
      if (userMessage) {
        contents.push({ role: "user", parts: [{ text: userMessage }] });
      } else {
        contents.push({ role: "user", parts: [{ text: "Please process the request." }] });
      }

      // Non-streaming path is used only by testConnection — skip tool injection.
      const body = buildGeminiBody(cfg, systemPrompt, contents, false);

      const url = cfg.baseUrl.replace(/\/$/, "") + "/models/" + cfg.model + ":generateContent?key=" + encodeURIComponent(cfg.apiKey);
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error("Gemini API error: " + res.status + " " + (await res.text()).substring(0, 200));
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    },

    async callLLM(systemPrompt, userMessage, isParse) {
      if (this.activeProvider === "anthropic") {
        return this.callAnthropic(systemPrompt, userMessage, isParse);
      }
      if (this.activeProvider === "gemini") {
        return this.callGemini(systemPrompt, userMessage);
      }
      return this.callOpenAI(systemPrompt, userMessage);
    },

    async callOpenAI(systemPrompt, userMessage) {
      const cfg = this.providers[this.activeProvider];
      const messages = [{ role: "system", content: systemPrompt }];
      if (userMessage) messages.push({ role: "user", content: userMessage });

      // Non-streaming path is used only by testConnection — skip tool injection.
      const body = buildOpenAIBody(this.activeProvider, cfg, messages, false, false);
      const res = await fetch(cfg.baseUrl.replace(/\/$/, "") + "/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + cfg.apiKey },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error("API error: " + res.status + " " + (await res.text()).substring(0, 200));
      const data = await res.json();
      return data.choices[0].message.content;
    },

    async callAnthropic(systemPrompt, userMessage, isParse) {
      const cfg = this.providers[this.activeProvider];
      const messages = [];
      if (userMessage) messages.push({ role: "user", content: userMessage });
      else messages.push({ role: "user", content: "Please process the request." });

      // Non-streaming path is used only by testConnection — skip tool injection.
      const body = buildAnthropicBody(cfg, systemPrompt, messages, false, false);
      const res = await fetch(cfg.baseUrl.replace(/\/$/, "") + "/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": cfg.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error("API error: " + res.status + " " + (await res.text()).substring(0, 200));
      const data = await res.json();
      return data.content[0].text;
    },

    scrollChat(force = false) {
      // force=true always snaps to bottom (use for user-initiated events).
      // Otherwise only auto-follow when the user is already near the bottom
      // — so scrolling up mid-stream doesn't get yanked back.
      this.$nextTick(() => {
        const el = this.$refs.chatContainer;
        if (!el) return;
        if (force) { el.scrollTop = el.scrollHeight; return; }
        const distanceFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
        if (distanceFromBottom < 80) el.scrollTop = el.scrollHeight;
      });
    },

    stopGeneration() {
      if (this.abortController) {
        this.abortController.abort();
        this.abortController = null;
      }
      this.loading = false;
    },

    renderMarkdown(content) {
      if (!content) return "";
      if (typeof marked === "undefined") {
        // Library not loaded yet — fall back to escaped plain text so we never inject raw HTML.
        return content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      try {
        const html = marked.parse(content, { breaks: true, gfm: true });
        return typeof DOMPurify !== "undefined" ? DOMPurify.sanitize(html) : html;
      } catch (e) {
        return content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
    },

    highlightJson(content) {
      if (!content) return "";
      // Try to prettify if valid JSON
      let display = content;
      try {
        display = JSON.stringify(JSON.parse(content), null, 2);
      } catch (e) {
        // Invalid/incomplete JSON — still try to make it readable
        try {
          // Try to complete common truncations
          let fixed = content;
          // Close unclosed strings
          const quoteCount = (fixed.match(/(?<!\\)"/g) || []).length;
          if (quoteCount % 2 !== 0) fixed += '"';
          // Close unclosed brackets
          const opens = (fixed.match(/[{\[]/g) || []).length;
          const closes = (fixed.match(/[}\]]/g) || []).length;
          for (let i = 0; i < opens - closes; i++) {
            fixed += fixed.includes('{') && opens - closes > 1 ? '}' : '';
          }
          display = JSON.stringify(JSON.parse(fixed), null, 2);
        } catch (e2) {
          // Can't fix — highlight raw content
        }
      }
      // Syntax highlight with highlight.js
      try {
        const result = hljs.highlight(display, { language: "json" });
        return result.value;
      } catch (e) {
        return display.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
    },

    handleEnter(e) {
      if (e.shiftKey) {
        // Shift+Enter: insert newline
        const ta = e.target;
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        this.chatInput = this.chatInput.substring(0, start) + "\n" + this.chatInput.substring(end);
        this.$nextTick(() => { ta.selectionStart = ta.selectionEnd = start + 1; });
      } else {
        this.sendMessage();
      }
    },

    startResize(e) {
      this.resizing = true;
      document.body.classList.add("resizing");
      const startY = e.clientY;
      const startH = this.inputHeight;
      const onMove = (ev) => {
        const newH = startH + (startY - ev.clientY);
        this.inputHeight = Math.max(100, Math.min(500, newH));
      };
      const onUp = () => {
        this.resizing = false;
        document.body.classList.remove("resizing");
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    },

    saveSettings() {
      const prefix = { deepseek: "mf_ds", openai: "mf_oai", anthropic: "mf_anth", gemini: "mf_gem" };
      Object.entries(this.providers).forEach(([name, cfg]) => {
        const p = prefix[name];
        localStorage.setItem(p + "_baseUrl", cfg.baseUrl);
        localStorage.setItem(p + "_model", cfg.model);
        if (cfg.reasoningEffort) localStorage.setItem(p + "_effort", cfg.reasoningEffort);
        localStorage.setItem(p + "_thinking", cfg.thinkingEnabled ? "true" : "false");
        if (cfg.apiKey) localStorage.setItem("mf_" + name + "_key", cfg.apiKey);
      });
      localStorage.setItem("mf_activeProvider", this.activeProvider);
      this.settingsMsg = "Settings saved!";
      this.settingsError = false;
      setTimeout(() => { this.settingsMsg = ""; this.showSettings = false; }, 1000);
    },

    async testConnection(providerName) {
      this.testing = true;
      this.testingProvider = providerName;
      const prevActive = this.activeProvider;
      try {
        this.activeProvider = providerName;
        if (providerName === "anthropic") {
          await this.callAnthropic("Reply with just 'OK'.", "test", false);
        } else if (providerName === "gemini") {
          await this.callGemini("Reply with just 'OK'.", "test");
        } else {
          await this.callOpenAI("Reply with just 'OK'.", "test");
        }
        this.testResults[providerName] = "ok";
        this.persistProvider(providerName);
      } catch (e) {
        this.testResults[providerName] = "fail";
        console.error(providerName + " test failed:", e);
      }
      this.activeProvider = prevActive;
      this.testing = false;
      this.testingProvider = null;
    },

    persistProvider(name) {
      const prefix = { deepseek: "mf_ds", openai: "mf_oai", anthropic: "mf_anth", gemini: "mf_gem" };
      const p = prefix[name];
      const cfg = this.providers[name];
      localStorage.setItem(p + "_baseUrl", cfg.baseUrl);
      localStorage.setItem(p + "_model", cfg.model);
      if (cfg.reasoningEffort) localStorage.setItem(p + "_effort", cfg.reasoningEffort);
      localStorage.setItem(p + "_thinking", cfg.thinkingEnabled ? "true" : "false");
      if (cfg.apiKey) localStorage.setItem("mf_" + name + "_key", cfg.apiKey);
    },

    exportJSON() {
      const data = {
        meta: this.meeting.meta,
        segments: this.meeting.segments.map(s => ({ type: s.type, startTime: s.startTime, duration: s.duration, roleTaker: s.roleTaker }))
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "meeting_" + (this.meeting.meta.no || "agenda") + ".json";
      a.click();
      URL.revokeObjectURL(url);
    },

    exportImage() {
      const el = this.$refs.vizPanel;
